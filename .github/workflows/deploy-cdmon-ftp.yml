name: Deploy cdmon (FTP)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # PHP + Composer
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Install PHP deps (production)
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      # Node + Vite build
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS deps
        run: npm install

      - name: Build assets (Vite)
        run: npm run build

      # Montamos una carpeta "deploy_out" con la estructura EXACTA del servidor:
      # /index.php, /.htaccess, /build
      # /nova-unio (Laravel completo)
      - name: Prepare deploy folder
        run: |
          rm -rf deploy_out
          mkdir -p deploy_out/nova-unio

          # Copiar TODO el proyecto a /nova-unio (incluye vendor y public/build)
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='storage/logs' \
            ./ deploy_out/nova-unio/

          # Copiar lo "público" al root (/, donde está el dominio)
          # .htaccess del public
          if [ -f "public/.htaccess" ]; then cp public/.htaccess deploy_out/.htaccess; fi

          # build de Vite al root (/build)
          if [ -d "public/build" ]; then cp -R public/build deploy_out/build; fi

          # index.php en root, pero apuntando a /nova-unio/...
          php -r '
            $src = file_get_contents("public/index.php");
            $src = str_replace("__DIR__.\"/../\"", "__DIR__.\"/nova-unio/\"", $src);
            $src = str_replace("__DIR__.\"/../vendor\"", "__DIR__.\"/nova-unio/vendor\"", $src);
            $src = str_replace("__DIR__.\"/../bootstrap\"", "__DIR__.\"/nova-unio/bootstrap\"", $src);
            $src = str_replace("__DIR__.\"/../storage\"", "__DIR__.\"/nova-unio/storage\"", $src);
            file_put_contents("deploy_out/index.php", $src);
          ';

          # Copia opcional de robots/favicon si existen
          if [ -f "public/robots.txt" ]; then cp public/robots.txt deploy_out/robots.txt; fi
          if [ -f "public/favicon.ico" ]; then cp public/favicon.ico deploy_out/favicon.ico; fi

      # Deploy FTP
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CDMON_FTP_SERVER }}
          username: ${{ secrets.CDMON_FTP_USERNAME }}
          password: ${{ secrets.CDMON_FTP_PASSWORD }}
          server-dir: ${{ secrets.CDMON_FTP_DIR }}
          local-dir: deploy_out/
          dangerous-clean-slate: false
          exclude: |
            **/.env
            **/storage/logs/**